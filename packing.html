<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="旅行の持ち物チェックリストです。">
    <title>持ち物 | 旅行のしおり</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-page="packing">
    <header class="site-header">
      <div class="header-inner">
        <a class="site-title" href="index.html">
          <strong class="js-trip-title">旅行のしおり</strong>
          <span class="js-trip-dates">旅の日程</span>
        </a>
        <nav class="site-nav" aria-label="メインナビゲーション">
          <a href="index.html">トップ</a>
          <a href="schedule.html">日程</a>
          <a href="packing.html" aria-current="page">持ち物</a>
          <a href="links.html">リンク</a>
          <a href="private.html">内緒メモ</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="page-title" aria-labelledby="page-title">
        <p class="eyebrow js-trip-destination">旅先</p>
        <h1 id="page-title">持ち物</h1>
        <p class="lead">
          出発前と朝に軽く見返せる、少なめの持ち物リストです。
        </p>
      </section>

      <section class="section" aria-labelledby="packing-title">
        <div class="section-header">
          <h2 id="packing-title">チェックリスト</h2>
          <p>身軽な一泊旅を想定した、必要なもの中心のリストです。</p>
        </div>
        <div class="packing-toolbar">
          <div class="progress" aria-live="polite">
            <div class="progress-label">
              <span>準備の進み具合</span>
              <span class="js-pack-progress-label">0/0 完了</span>
            </div>
            <div class="progress-bar" aria-hidden="true">
              <span class="js-pack-progress-bar"></span>
            </div>
          </div>
          <button class="button secondary js-reset-packing" type="button">チェックをリセット</button>
        </div>
        <div class="packing-list js-packing"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <span class="js-trip-title">旅行のしおり</span> / 持ち物
      </div>
    </footer>

    <script src="data/trip-data.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
